name: Electron macOS Build

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  macos-x64:
    runs-on: macos-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Electron app dependencies and renderer
        run: pnpm --filter anypost-electron build

      - name: Package macOS x64 DMG + ZIP
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: >
          pnpm --filter anypost-electron exec electron-builder
          --projectDir .
          --config electron-builder.yml
          --mac dmg zip
          --x64
          --publish never
          --config.directories.output=release

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: anypost-electron-macos-x64
          path: |
            apps/anypost-electron/release/*.dmg
            apps/anypost-electron/release/*mac*.zip
          if-no-files-found: error
