name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter anypost-core build
      - run: pnpm --filter anypost-core test
      - run: pnpm --filter anypost-web test
      - run: pnpm --filter anypost-relay build
      - run: pnpm --filter anypost-electron build:main

  validation:
    runs-on: ubuntu-latest
    needs: tests
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - name: Build core for e2e scripts
        run: pnpm --filter anypost-core build
      - run: pnpm --filter anypost-web exec playwright install --with-deps chromium

      - name: Run DM No-Relay Browser Integration
        run: pnpm --filter anypost-web run e2e:dm-no-relay-ipfs

      - name: Run DM Refresh Browser Integration
        shell: bash
        run: |
          set -euo pipefail
          for attempt in 1 2; do
            echo "DM refresh e2e attempt ${attempt}/2"
            if pnpm --filter anypost-web run e2e:dm-refresh-ipfs; then
              exit 0
            fi
            if [[ "$attempt" -lt 2 ]]; then
              echo "DM refresh e2e failed; retrying once..."
              sleep 3
            fi
          done
          echo "DM refresh e2e failed after 2 attempts"
          exit 1

      - name: Run Headless Validation
        run: pnpm --filter anypost-web run e2e:record -- --out-dir artifacts/headless-recordings/ci --record-wait-ms 195000 --settle-ms 5000

      - name: Upload Validation Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: headless-validation-recordings
          path: artifacts/headless-recordings/ci
          if-no-files-found: ignore
